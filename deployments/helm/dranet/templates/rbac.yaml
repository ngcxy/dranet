{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "dranet.fullname" . }}
  labels:
    {{- include "dranet.labels" . | nindent 4 }}
rules:
  - apiGroups:
      - ""
    resources:
      - nodes
    verbs:
      - get
  - apiGroups:
      - resource.k8s.io
    resources:
      - resourceslices
    verbs:
      - list
      - watch
      - create
      - update
      - delete
  - apiGroups:
      - resource.k8s.io
    resources:
      - resourceclaims
      - deviceclasses
    verbs:
      - get
  - apiGroups:
      - resource.k8s.io
    resources:
      - resourceclaims/status
    verbs:
      - patch
      - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "dranet.fullname" . }}
  labels:
    {{- include "dranet.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "dranet.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "dranet.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
