name: Helm Lint
on:
  pull_request:
    branches: [ main ]
    paths:
      - 'deployments/helm/**'
      - '.github/workflows/helm-lint.yml'

permissions:
  contents: read

jobs:
  helm-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Helm lint
        run: make helm-lint
