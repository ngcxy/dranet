name: bats

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.26"
  K8S_VERSION: "v1.36.1"
  KIND_VERSION: "v0.32.0"
  IMAGE_NAME: registry.k8s.io/networking/dranet
  KIND_CLUSTER_NAME: kind

permissions:
  contents: read

jobs:
  bats_tests:
    runs-on: ubuntu-22.04
    name: Bats e2e tests
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: system-level-dependencies
        run: |
          sudo apt update
          sudo apt -y install linux-modules-extra-$(uname -r)
          sudo modprobe -v vrf

      - name: Set up environment (download dependencies)
        run: |
          TMP_DIR=$(mktemp -d)
          # kubectl
          curl -L "https://dl.k8s.io/${{ env.K8S_VERSION }}/bin/linux/amd64/kubectl" -o "${TMP_DIR}/kubectl"
          # kind
          curl -Lo "${TMP_DIR}/kind" "https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64"
          # Install
          sudo cp "${TMP_DIR}/kubectl" /usr/local/bin/kubectl
          sudo cp "${TMP_DIR}/kind" /usr/local/bin/kind
          sudo chmod +x /usr/local/bin/*
          # Clean
          sudo rm -rf "${TMP_DIR}"

      - name: Setup Bats and bats libs
        id: setup-bats
        uses: bats-core/bats-action@77d6fb60505b4d0d1d73e48bd035b55074bbfb43 # 4.0.0
        with:
          support-path: ${{ github.workspace }}/tests/test_helper/bats-support
          assert-path: "${{ github.workspace }}/tests/test_helper/bats-assert"
      - name: Bats tests
        shell: bash
        env:
          BATS_LIB_PATH: ${{ steps.setup-bats.outputs.lib-path }}
          TERM: xterm
        run: bats -o _artifacts --print-output-on-failure tests/

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: kind-logs-${{ env.JOB_NAME }}-${{ github.run_id }}
          path: ./_artifacts
