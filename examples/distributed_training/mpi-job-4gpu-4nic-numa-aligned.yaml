apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: pytorch-nccl-mfu-4gpu-aligned
spec:
  slotsPerWorker: 4
  sshAuthMountPath: /root/.ssh
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          automountServiceAccountToken: false
          containers:
          - name: pytorch
            image: nvcr.io/nvidia/pytorch:25.10-py3
            command: ["/bin/bash", "-lc"]
            args:
            - |
              set -euo pipefail
              NUM_GPUS=${MFU_GPUS_PER_WORKER:-4}
              NUM_HOSTS=$(awk 'NF {print $1}' /etc/mpi/hostfile | sort -u | wc -l)
              NP=$((NUM_HOSTS * NUM_GPUS))
              export MASTER_ADDR=$(awk 'NF {print $1; exit}' /etc/mpi/hostfile)
              export MASTER_PORT=${MASTER_PORT:-29500}

              while ! (for host in $(awk 'NF {print $1}' /etc/mpi/hostfile | sort -u); do
                getent hosts "$host" >/dev/null || exit 1
                ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$host" true 2>/dev/null || exit 1
              done); do
                echo "Waiting for workers to accept SSH..."
                sleep 5
              done
              sleep 5

              echo "Launching aligned PyTorch NCCL MFU benchmark across ${NUM_HOSTS} nodes (${NP} ranks)"
              mpirun \
                --allow-run-as-root \
                --bind-to none \
                --map-by slot \
                -mca routed direct \
                -mca plm_rsh_args "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
                -x PATH \
                -x LD_LIBRARY_PATH \
                -x MASTER_ADDR \
                -x MASTER_PORT \
                -x NCCL_DEBUG=WARN \
                -x NCCL_SOCKET_IFNAME=eth0 \
                -x NCCL_IB_DISABLE=0 \
                -x NCCL_IB_HCA=mlx5 \
                -x NCCL_NET_GDR_LEVEL=PHB \
                -x NCCL_DMABUF_ENABLE=1 \
                -x CUDA_DEVICE_MAX_CONNECTIONS=1 \
                -x PYTHONUNBUFFERED=1 \
                -x MFU_BATCH_SIZE \
                -x MFU_HIDDEN_SIZE \
                -x MFU_LAYERS \
                -x MFU_WARMUP_STEPS \
                -x MFU_STEPS \
                -x GPU_PEAK_TFLOPS \
                -np "${NP}" \
                python3 -u /workspace/benchmark/mfu_benchmark.py
            env:
            - name: MFU_GPUS_PER_WORKER
              value: "4"
            - name: MFU_BATCH_SIZE
              value: "4096"
            - name: MFU_HIDDEN_SIZE
              value: "8192"
            - name: MFU_LAYERS
              value: "12"
            - name: MFU_WARMUP_STEPS
              value: "5"
            - name: MFU_STEPS
              value: "20"
            - name: GPU_PEAK_TFLOPS
              value: "989"
            volumeMounts:
            - name: benchmark
              mountPath: /workspace/benchmark
          volumes:
          - name: benchmark
            configMap:
              name: pytorch-nccl-mfu-benchmark
    Worker:
      replicas: 2
      template:
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    training.kubeflow.org/job-name: pytorch-nccl-mfu-4gpu-aligned
                    training.kubeflow.org/job-role: worker
                topologyKey: kubernetes.io/hostname
          automountServiceAccountToken: false
          resourceClaims:
          - name: gpu-nic
            resourceClaimTemplateName: h100-4gpu-4nic-numa-aligned
          containers:
          - name: pytorch
            image: nvcr.io/nvidia/pytorch:25.10-py3
            command: ["/bin/bash", "-lc"]
            args:
            - |
              set -euo pipefail
              SSHD=$(command -v sshd || true)
              if [ -z "${SSHD}" ]; then
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y --no-install-recommends openssh-server
                rm -rf /var/lib/apt/lists/*
                SSHD=$(command -v sshd)
              fi
              mkdir -p /run/sshd
              ssh-keygen -A
              echo "StrictModes no" >> /etc/ssh/sshd_config
              exec "${SSHD}" -De
            resources:
              claims:
              - name: gpu-nic
            securityContext:
              capabilities:
                add:
                - IPC_LOCK
            volumeMounts:
            - name: benchmark
              mountPath: /workspace/benchmark
            - name: shm
              mountPath: /dev/shm
          volumes:
          - name: benchmark
            configMap:
              name: pytorch-nccl-mfu-benchmark
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 64Gi
          tolerations:
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
