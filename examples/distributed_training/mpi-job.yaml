apiVersion: v1
kind: ConfigMap
metadata:
  name: pytorch-nccl-mfu-benchmark
data:
  mfu_benchmark.py: |
    import datetime
    import os
    import time

    import torch
    import torch.distributed as dist
    import torch.nn as nn
    import torch.nn.functional as F
    from torch.nn.parallel import DistributedDataParallel as DDP


    def env_int(name, default):
        return int(os.environ.get(name, default))


    def env_float(name, default):
        return float(os.environ.get(name, default))


    def default_peak_tflops(device_name):
        name = device_name.lower()
        if "h100" in name:
            return 989.0
        if "h200" in name:
            return 989.0
        if "b200" in name:
            return 2250.0
        if "gb200" in name:
            return 2500.0
        if "a100" in name:
            return 312.0
        return 989.0


    def first_host_from_mpi_hostfile():
        try:
            with open("/etc/mpi/hostfile", "r", encoding="utf-8") as hostfile:
                for line in hostfile:
                    fields = line.split()
                    if fields:
                        return fields[0]
        except FileNotFoundError:
            return "localhost"
        return "localhost"


    class DenseBenchmark(nn.Module):
        def __init__(self, hidden_size, layers):
            super().__init__()
            self.layers = nn.ModuleList(
                nn.Linear(hidden_size, hidden_size, bias=False) for _ in range(layers)
            )

        def forward(self, x):
            for index, layer in enumerate(self.layers):
                x = layer(x)
                if index + 1 != len(self.layers):
                    x = F.gelu(x)
            return x


    def main():
        rank = env_int("OMPI_COMM_WORLD_RANK", env_int("RANK", 0))
        world_size = env_int("OMPI_COMM_WORLD_SIZE", env_int("WORLD_SIZE", 1))
        local_rank = env_int("OMPI_COMM_WORLD_LOCAL_RANK", env_int("LOCAL_RANK", 0))

        os.environ.setdefault("RANK", str(rank))
        os.environ.setdefault("WORLD_SIZE", str(world_size))
        os.environ.setdefault("LOCAL_RANK", str(local_rank))
        os.environ.setdefault("MASTER_ADDR", first_host_from_mpi_hostfile())
        os.environ.setdefault("MASTER_PORT", "29500")

        if not torch.cuda.is_available():
            raise RuntimeError("CUDA is not available")

        device_count = torch.cuda.device_count()
        if device_count == 0:
            raise RuntimeError("No CUDA devices are visible")

        device_index = local_rank % device_count
        torch.cuda.set_device(device_index)
        device = torch.device("cuda", device_index)

        dist.init_process_group(
            backend="nccl",
            rank=rank,
            world_size=world_size,
            timeout=datetime.timedelta(minutes=30),
        )

        hidden_size = env_int("MFU_HIDDEN_SIZE", 8192)
        batch_size = env_int("MFU_BATCH_SIZE", 4096)
        layers = env_int("MFU_LAYERS", 12)
        warmup_steps = env_int("MFU_WARMUP_STEPS", 5)
        measure_steps = env_int("MFU_STEPS", 20)

        torch.manual_seed(1234 + rank)
        torch.backends.cuda.matmul.allow_tf32 = True

        model = DenseBenchmark(hidden_size, layers).to(device=device, dtype=torch.bfloat16)
        model = DDP(model, device_ids=[device_index], output_device=device_index)
        x = torch.randn(batch_size, hidden_size, device=device, dtype=torch.bfloat16)

        def train_step():
            model.zero_grad(set_to_none=True)
            y = model(x)
            loss = y.float().square().mean()
            loss.backward()
            return loss.detach()

        for _ in range(warmup_steps):
            train_step()

        torch.cuda.synchronize(device)
        dist.barrier()
        start = time.perf_counter()

        for _ in range(measure_steps):
            train_step()

        torch.cuda.synchronize(device)
        dist.barrier()
        elapsed = time.perf_counter() - start

        elapsed_tensor = torch.tensor([elapsed], device=device)
        dist.all_reduce(elapsed_tensor, op=dist.ReduceOp.MAX)
        elapsed = elapsed_tensor.item()

        step_seconds = elapsed / measure_steps
        # Linear layer training FLOPs: forward matmul + dInput + dWeight.
        flops_per_rank_step = 6.0 * batch_size * hidden_size * hidden_size * layers
        tflops_per_gpu = flops_per_rank_step / step_seconds / 1e12
        device_name = torch.cuda.get_device_name(device)
        peak_tflops = env_float("GPU_PEAK_TFLOPS", default_peak_tflops(device_name))
        mfu = 100.0 * tflops_per_gpu / peak_tflops
        global_tflops = tflops_per_gpu * world_size

        loss_tensor = train_step()
        dist.all_reduce(loss_tensor, op=dist.ReduceOp.AVG)

        if rank == 0:
            print(
                "MFU_RESULT "
                f"backend=nccl "
                f"device={device_name!r} "
                f"world_size={world_size} "
                f"local_visible_gpus={device_count} "
                f"batch_size_per_gpu={batch_size} "
                f"hidden_size={hidden_size} "
                f"layers={layers} "
                f"warmup_steps={warmup_steps} "
                f"measured_steps={measure_steps} "
                f"dtype=bf16 "
                f"avg_step_ms={step_seconds * 1000.0:.3f} "
                f"tflops_per_gpu={tflops_per_gpu:.2f} "
                f"global_tflops={global_tflops:.2f} "
                f"peak_tflops_per_gpu={peak_tflops:.1f} "
                f"mfu_percent={mfu:.2f} "
                f"final_loss={loss_tensor.item():.6f}",
                flush=True,
            )

        dist.destroy_process_group()


    if __name__ == "__main__":
        main()
---
apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: pytorch-nccl-mfu
spec:
  slotsPerWorker: 8
  sshAuthMountPath: /root/.ssh
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          automountServiceAccountToken: false
          containers:
          - name: pytorch
            image: nvcr.io/nvidia/pytorch:25.10-py3
            command: ["/bin/bash", "-lc"]
            args:
            - |
              set -euo pipefail
              NUM_GPUS=${MFU_GPUS_PER_WORKER:-8}
              NUM_HOSTS=$(awk 'NF {print $1}' /etc/mpi/hostfile | sort -u | wc -l)
              NP=$((NUM_HOSTS * NUM_GPUS))
              export MASTER_ADDR=$(awk 'NF {print $1; exit}' /etc/mpi/hostfile)
              export MASTER_PORT=${MASTER_PORT:-29500}

              while ! (for host in $(awk 'NF {print $1}' /etc/mpi/hostfile | sort -u); do
                ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null "$host" true 2>/dev/null || exit 1
              done); do
                echo "Waiting for workers to accept SSH..."
                sleep 5
              done

              echo "Launching PyTorch NCCL MFU benchmark across ${NUM_HOSTS} nodes (${NP} ranks)"
              mpirun \
                --allow-run-as-root \
                --bind-to none \
                --map-by slot \
                -mca plm_rsh_args "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
                -x PATH \
                -x LD_LIBRARY_PATH \
                -x MASTER_ADDR \
                -x MASTER_PORT \
                -x NCCL_DEBUG=WARN \
                -x NCCL_SOCKET_IFNAME=eth0 \
                -x NCCL_IB_DISABLE=0 \
                -x NCCL_IB_HCA=mlx5 \
                -x NCCL_NET_GDR_LEVEL=PHB \
                -x NCCL_DMABUF_ENABLE=1 \
                -x CUDA_DEVICE_MAX_CONNECTIONS=1 \
                -x PYTHONUNBUFFERED=1 \
                -x MFU_BATCH_SIZE \
                -x MFU_HIDDEN_SIZE \
                -x MFU_LAYERS \
                -x MFU_WARMUP_STEPS \
                -x MFU_STEPS \
                -x GPU_PEAK_TFLOPS \
                -np "${NP}" \
                python3 -u /workspace/benchmark/mfu_benchmark.py
            env:
            - name: MFU_GPUS_PER_WORKER
              value: "8"
            - name: MFU_BATCH_SIZE
              value: "4096"
            - name: MFU_HIDDEN_SIZE
              value: "8192"
            - name: MFU_LAYERS
              value: "12"
            - name: MFU_WARMUP_STEPS
              value: "5"
            - name: MFU_STEPS
              value: "20"
            - name: GPU_PEAK_TFLOPS
              value: "989"
            volumeMounts:
            - name: benchmark
              mountPath: /workspace/benchmark
          volumes:
          - name: benchmark
            configMap:
              name: pytorch-nccl-mfu-benchmark
    Worker:
      replicas: 2
      template:
        spec:
          affinity:
            podAntiAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    training.kubeflow.org/job-name: pytorch-nccl-mfu
                    training.kubeflow.org/job-role: worker
                topologyKey: kubernetes.io/hostname
          automountServiceAccountToken: false
          resourceClaims:
          - name: gpu-nic
            resourceClaimTemplateName: h100-8gpu-8nic
          containers:
          - name: pytorch
            image: nvcr.io/nvidia/pytorch:25.10-py3
            command: ["/bin/bash", "-lc"]
            args:
            - |
              set -euo pipefail
              SSHD=$(command -v sshd || true)
              if [ -z "${SSHD}" ]; then
                export DEBIAN_FRONTEND=noninteractive
                apt-get update
                apt-get install -y --no-install-recommends openssh-server
                rm -rf /var/lib/apt/lists/*
                SSHD=$(command -v sshd)
              fi
              mkdir -p /run/sshd
              ssh-keygen -A
              echo "StrictModes no" >> /etc/ssh/sshd_config
              exec "${SSHD}" -De
            resources:
              claims:
              - name: gpu-nic
            securityContext:
              capabilities:
                add:
                - IPC_LOCK
            volumeMounts:
            - name: benchmark
              mountPath: /workspace/benchmark
            - name: shm
              mountPath: /dev/shm
          volumes:
          - name: benchmark
            configMap:
              name: pytorch-nccl-mfu-benchmark
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: 64Gi
          tolerations:
          - key: "nvidia.com/gpu"
            operator: "Exists"
            effect: "NoSchedule"
