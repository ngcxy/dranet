apiVersion: v1
kind: ConfigMap
metadata:
  name: whereabouts-cni-config
  namespace: kube-system
data:
  90-dranet-whereabouts.conf: |
    {
      "cniVersion": "0.3.0",
      "name": "whereabouts-profile",
      "ipam": {
        "type": "whereabouts",
        "range": "192.168.100.0/24",
        "log_file" : "/tmp/whereabouts.log",
        "log_level" : "debug"
      }
    }
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: whereabouts-webhook
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: whereabouts-webhook
  template:
    metadata:
      labels:
        app: whereabouts-webhook
    spec:
      hostNetwork: true
      tolerations:
      - operator: Exists
        effect: NoSchedule
      containers:
      - name: webhook
        image: dranet/webhook-whereabouts:test
        imagePullPolicy: Never
        command: ["/usr/local/bin/webhook-whereabouts", "--bind-address=127.0.0.1:8080", "--cni-bin-dir=/opt/cni/bin", "--cni-conf-dir=/etc/cni/net.d"]
        volumeMounts:
        - name: cni-bin
          mountPath: /opt/cni/bin
        - name: cni-conf-dir
          mountPath: /etc/cni/net.d
        - name: cni-conf
          mountPath: /etc/cni/net.d/90-dranet-whereabouts.conf
          subPath: 90-dranet-whereabouts.conf
      volumes:
      - name: cni-bin
        hostPath:
          path: /opt/cni/bin
          type: Directory
      - name: cni-conf-dir
        hostPath:
          path: /etc/cni/net.d
          type: DirectoryOrCreate
      - name: cni-conf
        configMap:
          name: whereabouts-cni-config
