apiVersion: resource.k8s.io/v1
kind: ResourceClaimTemplate
metadata:
  name: whereabouts-claim
spec:
  spec:
    devices:
      requests:
        - name: req-1
          exactly:
            deviceClassName: dra.net
            selectors:
              - cel:
                  expression: has(device.attributes["dra.net"].type) && device.attributes["dra.net"].type == "dummy"
      config:
        - opaque:
            driver: dra.net
            parameters:
              profile: whereabouts-profile
