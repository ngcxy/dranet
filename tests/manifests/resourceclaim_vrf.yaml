---
apiVersion: resource.k8s.io/v1
kind: ResourceClaim
metadata:
  name: dynamic-interface-vrf-router
spec:
  devices:
    requests:
      - name: req-veth-router-1
        exactly:
          deviceClassName: dra.net
          selectors:
            - cel:
                expression: has(device.attributes["dra.net"].ifName) && device.attributes["dra.net"].ifName == "vrf-rtr-1"
      - name: req-veth-router-2
        exactly:
          deviceClassName: dra.net
          selectors:
            - cel:
                expression: has(device.attributes["dra.net"].ifName) && device.attributes["dra.net"].ifName == "vrf-rtr-2"
    config:
      - requests:
          - req-veth-router-1
        opaque:
          driver: dra.net
          parameters:
            interface:
              name: "eth1"
              addresses:
                - "10.10.10.2/24"
              forwarding: true
              vrf:
                name: "test-vrf"
      - requests:
          - req-veth-router-2
        opaque:
          driver: dra.net
          parameters:
            interface:
              name: "eth2"
              addresses:
                - "10.10.20.2/24"
              forwarding: true
              vrf:
                name: "test-vrf"
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-vrf-router
  labels:
    app: pod-vrf-router
spec:
  containers:
    - name: ctr1
      image: registry.k8s.io/e2e-test-images/agnhost:2.54
      command: ["/agnhost", "netexec", "--http-port=8080"]
  resourceClaims:
    - name: vrf-router
      resourceClaimName: dynamic-interface-vrf-router
